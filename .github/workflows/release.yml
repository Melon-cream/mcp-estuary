name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build package
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BIN_EXT: ${{ matrix.ext }}
          ARCHIVE_TYPE: ${{ matrix.archive }}
        run: |
          set -euo pipefail

          package_name="mcpe_${GOOS}_${GOARCH}"
          workdir="dist/${package_name}"
          binary_name="mcpe${BIN_EXT}"

          mkdir -p "${workdir}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath -ldflags="-s -w" -o "${workdir}/${binary_name}" ./cmd/mcpe

          cp README.md LICENSE.md "${workdir}/"

          mkdir -p release-assets
          if [ "${ARCHIVE_TYPE}" = "zip" ]; then
            (
              cd dist
              zip -r "../release-assets/${package_name}.zip" "${package_name}"
            )
          else
            tar -C dist -czf "release-assets/${package_name}.tar.gz" "${package_name}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          pattern: mcpe-*
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ./.github/scripts/extract-release-notes.sh "${TAG_NAME}" CHANGELOG.md > release-notes.md

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > checksums.txt

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --notes-file release-notes.md
            gh release upload "${TAG_NAME}" release-assets/* --clobber
          else
            gh release create "${TAG_NAME}" release-assets/* --verify-tag --notes-file release-notes.md
          fi
