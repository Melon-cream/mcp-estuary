name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"

permissions:
  contents: read

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...
