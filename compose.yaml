services:
  gateway:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      INSTALL_CONCURRENCY: ${INSTALL_CONCURRENCY:-2}
    volumes:
      - ./mcpe.json:/workspace/mcpe.json:ro
      - ./.memory:/workspace/.memory
      - mcpe-data:/root/.mcp-estuary
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  mcpe-data:
